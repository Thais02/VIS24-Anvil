components:
- components:
  - components:
    - event_bindings: {change: radio_change}
      layout_properties: {grid_position: 'QNLBGI,ZJVWWB'}
      name: radio_pos
      properties: {align: center, bold: false, italic: false, selected: true, spacing_above: none, spacing_below: none, text: Highest round reached, tooltip: goals, underline: false, value: pos}
      type: RadioButton
    - event_bindings: {change: radio_change}
      layout_properties: {grid_position: 'QNLBGI,FMAHWV'}
      name: radio_goals
      properties: {align: center, selected: false, spacing_above: none, spacing_below: none, text: Goals per year, tooltip: goals, value: goals}
      type: RadioButton
    - event_bindings: {change: radio_change}
      layout_properties: {grid_position: 'QNLBGI,ZGHAXB'}
      name: radio_xg
      properties: {align: center, enabled: true, spacing_above: none, spacing_below: none, text: Goals scored vs. expected goals, value: xg}
      type: RadioButton
    - event_bindings: {change: radio_change}
      layout_properties: {grid_position: 'QNLBGI,IUURYU'}
      name: radio_xp
      properties: {align: center, enabled: true, spacing_above: none, spacing_below: none, text: Winrate vs. expected winrate, value: xp}
      type: RadioButton
    - event_bindings: {change: radio_change}
      layout_properties: {grid_position: 'QNLBGI,FROQRP'}
      name: radio_cards
      properties: {align: center, enabled: true, spacing_above: none, spacing_below: none, text: Cards throughout the years, value: cards}
      type: RadioButton
    layout_properties: {full_width_row: false, grid_position: 'VADHFB,ANIXRH'}
    name: card_5
    properties: {role: card, spacing_above: none, spacing_below: small}
    type: ColumnPanel
  - components:
    - components:
      - layout_properties: {grid_position: 'SUDVTP,CHVLJJ'}
        name: label_5
        properties: {align: right, bold: true, font_size: 16, spacing_above: none, text: Map type}
        type: Label
      - event_bindings: {change: setting_change}
        layout_properties: {grid_position: 'SUDVTP,NDKIDN KELOJE,JGLLZG'}
        name: dropdown_projection
        properties:
          items: [equirectangular, orthographic, natural earth]
          spacing_above: none
        type: DropDown
      - event_bindings: {change: setting_change}
        layout_properties: {grid_position: 'SUDVTP,NDKIDN YDQYKS,SPIYHY'}
        name: checkbox_water
        properties: {spacing_above: none, spacing_below: none, text: Draw oceans}
        type: CheckBox
      layout_properties: {grid_position: 'YQANLJ,WQMJJY'}
      name: card_7
      properties: {col_widths: '{"CHVLJJ":15,"NDKIDN":45}', role: card, spacing_above: none, spacing_below: none}
      type: ColumnPanel
    - components:
      - layout_properties: {grid_position: 'QNQRID,VEODDO'}
        name: label_2
        properties: {align: right, bold: true, font_size: 16, spacing_above: none, spacing_below: none, text: 'Highlight '}
        type: Label
      - event_bindings: {change: setting_change}
        layout_properties: {grid_position: 'QNQRID,NZMRNP BKUQMP,AOZNTQ'}
        name: dropdown_continent
        properties:
          align: left
          include_placeholder: false
          items: [World, North America, Asia, Africa, Europe, South America, Oceania, '{custom selection}']
          placeholder: ''
          spacing_above: none
          spacing_below: none
        type: DropDown
      - event_bindings: {change: setting_change}
        layout_properties: {grid_position: 'QNQRID,NZMRNP AZVXBQ,IPKLUY'}
        name: checkbox_scope
        properties: {spacing_above: small, spacing_below: none, text: Hide others}
        type: CheckBox
      layout_properties: {grid_position: 'YQANLJ,IUZWQP'}
      name: card_1
      properties: {role: card, spacing_above: none, spacing_below: none}
      type: ColumnPanel
    - components:
      - layout_properties: {grid_position: 'LGOPUD,WJNHXJ'}
        name: label_3
        properties: {align: right, bold: true, font_size: 16, spacing_above: none, text: Colour scale}
        type: Label
      - data_bindings:
        - {code: 'self.config[''colorscale'']', property: selected_value, writeback: true}
        event_bindings: {change: setting_change}
        layout_properties: {grid_position: 'LGOPUD,XJHXCZ FTTOKW,BMBXRH'}
        name: dropdown_colorscale
        properties:
          include_placeholder: false
          items: ['']
          placeholder: ''
          spacing_above: none
        type: DropDown
      - data_bindings:
        - {code: 'self.config[''reversescale'']', property: checked, writeback: true}
        event_bindings: {change: setting_change}
        layout_properties: {grid_position: 'LGOPUD,XJHXCZ UHSHGF,KKVDRC'}
        name: reversescale
        properties: {checked: true, spacing_below: none, text: Reverse colour scale}
        type: CheckBox
      layout_properties: {grid_position: 'YQANLJ,VACGRQ'}
      name: card_colourscale
      properties: {col_widths: '{"WJNHXJ":15,"XJHXCZ":45}', role: card, spacing_above: none, spacing_below: none, visible: false}
      type: ColumnPanel
    layout_properties: {full_width_row: false, grid_position: 'YXXWUS,THSSBN'}
    name: panel_settings
    properties: {col_widths: '{"VACGRQ":24,"WQMJJY":25,"IUZWQP":11}', spacing_below: medium}
    type: ColumnPanel
  - components:
    - components:
      - event_bindings: {click: plot_map_click, hover: plot_map_hover, select: plot_map_select, unhover: plot_map_unhover}
        layout_properties: {full_width_row: true, grid_position: 'CQZPOA,QOKRGL'}
        name: plot_map
        properties: {height: '700', spacing_above: none, spacing_below: none}
        type: Plot
      - layout_properties: {full_width_row: true, grid_position: 'HUILBT,LHRSJN', row_background: ''}
        name: hint_maptap
        properties: {align: center, bold: false, foreground: 'theme:Primary 500', icon: 'fa:hand-o-up', icon_align: left, italic: false, spacing_above: none, spacing_below: none, text: Try tapping a country to see more data, underline: false}
        type: Label
      - event_bindings: {}
        layout_properties: {grid_position: 'HUILBT,TTFTKV'}
        name: hint_popover
        properties: {align: center, col_spacing: none, foreground: 'theme:Primary 500', icon: 'fa:question-circle-o', icon_align: left, role: null, spacing_above: none, spacing_below: none, text: Tap here to learn more about this visualization}
        type: Link
      layout_properties: {full_width_row: true, grid_position: 'ECTMPY,RSMUAG'}
      name: card_map
      properties: {col_spacing: none, col_widths: '{"LHRSJN":38,"TTFTKV":22}', role: card, spacing_above: none, spacing_below: none}
      type: ColumnPanel
    - components:
      - layout_properties: {full_width_row: true, grid_position: 'CVFXOR,HCVPNV'}
        name: plot_bar
        properties: {height: '300', spacing_above: none, spacing_below: none, visible: true}
        type: Plot
      layout_properties: {full_width_row: true, grid_position: 'ECTMPY,HGRMGT DJSHCG,JQQEUG'}
      name: card_sideplot1
      properties: {role: card, spacing_above: none, spacing_below: small, visible: false}
      type: ColumnPanel
    - components:
      - layout_properties: {full_width_row: true, grid_position: 'SRWHWC,HGZORL'}
        name: rich_text_side
        properties: {spacing_above: none, spacing_below: none}
        type: RichText
      layout_properties: {full_width_row: true, grid_position: 'ECTMPY,HGRMGT RUBPJQ,KYCEXI'}
      name: card_sideplot2
      properties: {role: card}
      type: ColumnPanel
    layout_properties: {full_width_row: true, grid_position: 'GCGLSE,GRWHRY'}
    name: cards_map_sides
    properties: {col_widths: '{"RSMUAG":45,"HGRMGT":15}'}
    type: ColumnPanel
  - event_bindings: {tick: timer_tick}
    layout_properties: {grid_position: 'ANSSAX,CDBEQB UDLNGK,HBMLWI'}
    name: timer
    properties: {interval: 0}
    type: Timer
  - components:
    - layout_properties: {grid_position: 'OZSDIE,RDAAIS'}
      name: spacer_1
      properties: {height: '20'}
      type: Spacer
    - event_bindings: {change: setting_change, slide: setting_change}
      layout_properties: {full_width_row: false, grid_position: 'LVOTPT,LIDFVU', row_background: ''}
      name: slider_single
      properties: {behaviour: tap, color: 'theme:Primary 500', connect: 'True, False', enabled: false, format: .0f, handle_size: '24', limit: '', margin: '4', max: 2022, min: 1930, pips: true, pips_density: -1, pips_mode: steps, pips_stepped: true, spacing_above: small, start: '1930', step: 4, tooltips: true}
      type: form:dep_ld9bkyex0y6t8:Slider
    - event_bindings: {change: setting_change, slide: setting_change}
      layout_properties: {grid_position: 'PHRNMA,FPOEFG'}
      name: slider_multi
      properties: {behaviour: tap, color: 'theme:Primary 500', connect: 'False,True, False', format: .0f, handle_size: '24', limit: '', margin: '4', max: 2022, min: 1930, pips: true, pips_density: -1, pips_mode: steps, pips_stepped: true, spacing_above: small, start: '1930,1934', step: 4, tooltips: true, visible: false}
      type: form:dep_ld9bkyex0y6t8:Slider
    - components:
      - event_bindings: {change: checkbox_multiselect_change}
        layout_properties: {slot: checkbox}
        name: checkbox_multiselect
        properties: {align: center, bold: true, checked: false, enabled: false, font_size: 16, spacing_above: none, spacing_below: none, text: Multi-select}
        type: CheckBox
      - event_bindings: {change: setting_change}
        layout_properties: {slot: dropdown}
        name: dropdown_multiselect
        properties:
          enabled: false
          items: [show average, show difference]
          spacing_above: none
          spacing_below: none
        type: DropDown
      - layout_properties: {slot: label}
        name: hint_multiselect
        properties: {align: left, foreground: 'theme:Red', italic: true, spacing_above: none, spacing_below: none, text: Not available for this visualization, visible: true}
        type: Label
      layout_properties: {grid_position: 'LAIZAT,FDOIRT'}
      name: richtext_multi_select
      properties:
        align: left
        content: |-
          {checkbox} {dropdown}
          {label}
        spacing_below: none
      type: RichText
    - event_bindings: {click: button_play_click}
      layout_properties: {grid_position: 'LAIZAT,QMITNI'}
      name: button_play
      properties: {align: center, bold: false, enabled: true, font_size: 25, icon: 'fa:play', text: ''}
      type: Button
    layout_properties: {full_width_row: true, grid_position: 'RPBTWN,DYNAXB'}
    name: card_sliders
    properties: {col_widths: '{"FDOIRT":17,"QMITNI":43}', role: card}
    type: ColumnPanel
  - layout_properties: {full_width_row: true, grid_position: 'CZEJNA,SKTTCO'}
    name: column_panel_1
    properties: {}
    type: ColumnPanel
  - event_bindings: {click: up_button_click}
    layout_properties: {full_width_row: true, grid_position: 'IXTFXV,AOUEOW'}
    name: up_button
    properties: {align: full, icon: 'fa:angle-double-up', icon_align: top, role: null, spacing_below: small, text: Back to map, visible: false}
    type: Button
  layout_properties: {slot: default}
  name: content_panel
  properties: {col_widths: '{}'}
  type: ColumnPanel
- components:
  - layout_properties: {expand: false}
    name: label_uplink
    properties: {bold: false, icon: 'fa:chain', spacing_above: none, spacing_below: none, text: Local script connected, underline: false, visible: false}
    type: Label
  layout_properties: {slot: nav-right}
  name: navbar_links
  properties: {}
  type: FlowPanel
- layout_properties: {slot: title}
  name: label_4
  properties: {spacing_above: none, spacing_below: none, text: Visualization group 24}
  type: Label
container:
  event_bindings: {show: form_show}
  properties: {html: '@theme:standard-page.html'}
  type: HtmlTemplate
is_package: true
